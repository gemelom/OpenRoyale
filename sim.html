<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenRoyale Python Human Renderer</title>
    <style>
      body {
        margin: 0;
        background: #1f2420;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      #shell {
        display: grid;
        grid-template-columns: 360px 180px;
        gap: 16px;
        align-items: start;
      }

      #game-container {
        position: relative;
        width: 360px;
        height: 640px;
        overflow: hidden;
        background: #416735;
        border: 2px solid #202820;
      }

      #status {
        min-height: 640px;
        padding: 12px;
        box-sizing: border-box;
        background: #171a18;
        border: 1px solid #30372f;
        font-size: 13px;
        line-height: 1.45;
      }

      .metric {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 6px 0;
        border-bottom: 1px solid #2d342d;
      }

      .entity,
      .tower {
        position: absolute;
        transform: translate(-50%, -50%);
        z-index: 10;
      }

      .hp-text {
        position: absolute;
        top: -20px;
        left: 50%;
        transform: translateX(-50%);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 14px;
        font-weight: 900;
        text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000, 0 2px 4px rgba(0, 0, 0, 0.8);
        pointer-events: none;
        z-index: 100;
      }
    </style>
  </head>
  <body>
    <main id="shell">
      <div id="game-container"></div>
      <aside id="status"></aside>
    </main>
    <script type="module" src="/src/sim-renderer.ts"></script>
  </body>
</html>
