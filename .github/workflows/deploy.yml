name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # 当 main 分支收到推送时自动触发构建

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # 将打包生成的 dist 文件夹内容发布
          branch: gh-pages # 自动推送到 gh-pages 分支
